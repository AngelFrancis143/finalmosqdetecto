<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Settings</title>
  <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
  <style>
    /* Reset and Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: #f5f7fb;
      color: #333;
      padding: 20px;
      line-height: 1.5;
      transition: background-color 0.3s, color 0.3s;
    }

    body.dark-mode {
      background-color: #1a1a1a;
      color: #e0e0e0;
    }

    /* Layout Container */
    .settings-container {
      max-width: 600px;
      margin: 0 auto;
    }

    /* Header with Back Button */
    .settings-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    .btn-back {
      text-decoration: none;
      color: darkgreen;
      font-size: 16px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      transition: color 0.2s;
    }

    .btn-back:hover {
      color: #0056b3;
    }

    body.dark-mode .btn-back {
      color: #81c784;
    }

    h1 {
      font-size: 24px;
      color: #111;
      transition: color 0.3s;
    }

    body.dark-mode h1 {
      color: #e0e0e0;
    }

    /* Settings Card */
    .settings-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      padding: 20px;
      margin-bottom: 20px;
      transition: background-color 0.3s, box-shadow 0.3s;
    }

    body.dark-mode .settings-card {
      background: #2a2a2a;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: darkgreen;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 15px;
      border-bottom: 1px solid #eee;
      padding-bottom: 8px;
      transition: color 0.3s, border-color 0.3s;
    }

    body.dark-mode .section-title {
      color: #81c784;
      border-bottom: 1px solid #444;
    }

    /* Settings Row */
    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
    }

    .settings-row:not(:last-child) {
      border-bottom: 1px solid #f9f9f9;
    }

    body.dark-mode .settings-row:not(:last-child) {
      border-bottom: 1px solid #444;
    }

    .settings-info {
      padding-right: 15px;
    }

    .settings-label {
      font-weight: 500;
      font-size: 16px;
      color: #222;
      transition: color 0.3s;
    }

    body.dark-mode .settings-label {
      color: #e0e0e0;
    }

    .settings-description {
      font-size: 13px;
      color: #666;
      margin-top: 2px;
      transition: color 0.3s;
    }

    body.dark-mode .settings-description {
      color: #999;
    }

    /* Form Inputs */
    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #444;
      transition: color 0.3s;
    }

    body.dark-mode .form-group label {
      color: #ccc;
    }

    input[type="text"],
    input[type="email"],
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      background-color: #fff;
      color: #333;
      transition: border-color 0.2s, background-color 0.3s, color 0.3s;
    }

    body.dark-mode input[type="text"],
    body.dark-mode input[type="email"],
    body.dark-mode select {
      background-color: #3a3a3a;
      color: #e0e0e0;
      border-color: #555;
    }

    input:focus, select:focus {
      outline: none;
      border-color: darkgreen;
    }

    /* Custom Toggle Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 28px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 28px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: darkgreen;
    }

    input:checked + .slider:before {
      transform: translateX(22px);
    }

    /* Action Button */
    .btn-save {
      display: block;
      width: 100%;
      background-color: darkgreen;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-save:hover {
      background-color: #0a3d1a;
    }

    .notification {
      display: none;
      padding: 12px 16px;
      margin-bottom: 15px;
      border-radius: 8px;
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      transition: display 0.3s;
    }

    body.dark-mode .notification {
      background-color: #1e5631;
      color: #81c784;
      border-color: #2d7a3a;
    }

    /* Responsive Adjustments */
    @media (max-width: 480px) {
      body {
        padding: 12px;
      }
      .settings-card {
        padding: 15px;
      }
    }
  </style>
</head>
<body>

  <div class="settings-container">
    <div class="settings-header">
      <a href="index.html" class="btn-back">&#8592; Back</a>
      <h1 id="settings-title">Settings</h1>
    </div>

    <div class="notification" id="notification"></div>

    <form id="settingsForm">
      
      <div class="settings-card">
        <div class="section-title" id="profile-section">Profile Information</div>
        
        <div class="form-group">
          <label for="username" id="label-fullname">Full Name</label>
          <input type="text" id="username" name="username" placeholder="Your name">
        </div>

        <div class="form-group">
          <label for="email" id="label-email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Your email">
        </div>
      </div>

      <div class="settings-card">
        <div class="section-title" id="notifications-section">Notifications</div>
        
        <div class="settings-row">
          <div class="settings-info">
            <div class="settings-label" id="email-notif-label">Email Notifications</div>
            <div class="settings-description" id="email-notif-desc">Receive weekly updates and activity summaries.</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="emailNotif" checked>
            <span class="slider"></span>
          </label>
        </div>

        <div class="settings-row">
          <div class="settings-info">
            <div class="settings-label" id="push-notif-label">Push Notifications</div>
            <div class="settings-description" id="push-notif-desc">Get instant alerts on your mobile device.</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="pushNotif">
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div class="settings-card">
        <div class="section-title" id="preferences-section">Preferences</div>
        
        <div class="settings-row">
          <div class="settings-info">
            <div class="settings-label" id="dark-mode-label">Dark Mode</div>
            <div class="settings-description" id="dark-mode-desc">Switch to a darker theme to save battery.</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="darkModeToggle">
            <span class="slider"></span>
          </label>
        </div>

        <div class="form-group" style="margin-top: 15px;">
          <label for="language" id="label-language">Language</label>
          <select id="language" name="language">
            <option value="en" selected>English</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="tl">Tagalog</option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn-save" id="btn-save-text">Save Changes</button>

    </form>
  </div>

  <script>
    // Translation dictionary
    const translations = {
      en: {
        'settings-title': 'Settings',
        'profile-section': 'Profile Information',
        'label-fullname': 'Full Name',
        'label-email': 'Email Address',
        'notifications-section': 'Notifications',
        'email-notif-label': 'Email Notifications',
        'email-notif-desc': 'Receive weekly updates and activity summaries.',
        'push-notif-label': 'Push Notifications',
        'push-notif-desc': 'Get instant alerts on your mobile device.',
        'preferences-section': 'Preferences',
        'dark-mode-label': 'Dark Mode',
        'dark-mode-desc': 'Switch to a darker theme to save battery.',
        'label-language': 'Language',
        'btn-save-text': 'Save Changes',
        'notification-success': 'Settings saved successfully!'
      },
      es: {
        'settings-title': 'Configuración',
        'profile-section': 'Información del Perfil',
        'label-fullname': 'Nombre Completo',
        'label-email': 'Dirección de Correo',
        'notifications-section': 'Notificaciones',
        'email-notif-label': 'Notificaciones por Correo',
        'email-notif-desc': 'Reciba actualizaciones semanales y resúmenes de actividad.',
        'push-notif-label': 'Notificaciones Push',
        'push-notif-desc': 'Obtenga alertas instantáneas en su dispositivo móvil.',
        'preferences-section': 'Preferencias',
        'dark-mode-label': 'Modo Oscuro',
        'dark-mode-desc': 'Cambia a un tema más oscuro para ahorrar batería.',
        'label-language': 'Idioma',
        'btn-save-text': 'Guardar Cambios',
        'notification-success': '¡Configuración guardada exitosamente!'
      },
      fr: {
        'settings-title': 'Paramètres',
        'profile-section': 'Informations de Profil',
        'label-fullname': 'Nom Complet',
        'label-email': 'Adresse Email',
        'notifications-section': 'Notifications',
        'email-notif-label': 'Notifications par Email',
        'email-notif-desc': 'Recevez des mises à jour hebdomadaires et des résumés d\'activité.',
        'push-notif-label': 'Notifications Push',
        'push-notif-desc': 'Recevez des alertes instantanées sur votre appareil mobile.',
        'preferences-section': 'Préférences',
        'dark-mode-label': 'Mode Sombre',
        'dark-mode-desc': 'Basculer vers un thème plus sombre pour économiser la batterie.',
        'label-language': 'Langue',
        'btn-save-text': 'Enregistrer les Modifications',
        'notification-success': 'Paramètres enregistrés avec succès!'
      },
      tl: {
        'settings-title': 'Mga Setting',
        'profile-section': 'Impormasyon ng Profile',
        'label-fullname': 'Buong Pangalan',
        'label-email': 'Email Address',
        'notifications-section': 'Mga Notipikasyon',
        'email-notif-label': 'Email Notifications',
        'email-notif-desc': 'Makatanggap ng linggong update at activity summaries.',
        'push-notif-label': 'Push Notifications',
        'push-notif-desc': 'Kumuha ng instant alerts sa inyong mobile device.',
        'preferences-section': 'Mga Preference',
        'dark-mode-label': 'Dark Mode',
        'dark-mode-desc': 'Lumipat sa mas madilim na tema upang makatipid ng battery.',
        'label-language': 'Wika',
        'btn-save-text': 'I-save ang Mga Pagbabago',
        'notification-success': 'Matagumpay na nai-save ang mga setting!'
      }
    };

    // Load settings from localStorage
    function loadSettings() {
      const savedSettings = JSON.parse(localStorage.getItem('userSettings')) || {};
      const currentLanguage = savedSettings.language || 'en';
      
      // Load form values
      document.getElementById('username').value = savedSettings.username || 'John Doe';
      document.getElementById('email').value = savedSettings.email || 'johndoe@example.com';
      document.getElementById('emailNotif').checked = savedSettings.emailNotif !== false;
      document.getElementById('pushNotif').checked = savedSettings.pushNotif || false;
      document.getElementById('darkModeToggle').checked = savedSettings.darkMode || false;
      document.getElementById('language').value = currentLanguage;

      // Apply dark mode immediately based on saved setting
      if (savedSettings.darkMode) {
        document.body.classList.add('dark-mode');
      } else {
        document.body.classList.remove('dark-mode');
      }

      // Apply language
      applyLanguage(currentLanguage);
    }

    // Apply language translations
    function applyLanguage(lang) {
      if (translations[lang]) {
        Object.keys(translations[lang]).forEach(key => {
          const element = document.getElementById(key);
          if (element) {
            element.textContent = translations[lang][key];
          }
        });
      }
    }

    // Save settings to localStorage
    function saveSettings() {
      const settings = {
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        emailNotif: document.getElementById('emailNotif').checked,
        pushNotif: document.getElementById('pushNotif').checked,
        darkMode: document.getElementById('darkModeToggle').checked,
        language: document.getElementById('language').value
      };

      localStorage.setItem('userSettings', JSON.stringify(settings));
    }

    // Instant Visual Dark Mode UI Toggle
    document.getElementById('darkModeToggle').addEventListener('change', function() {
      if (this.checked) {
        document.body.classList.add('dark-mode');
      } else {
        document.body.classList.remove('dark-mode');
      }
    });

    // Language change engine
    document.getElementById('language').addEventListener('change', function() {
      applyLanguage(this.value);
    });

    // Form submission management
    document.getElementById('settingsForm').addEventListener('submit', function(e) {
      e.preventDefault();
      saveSettings();
      
      // Show confirmation alert
      const notification = document.getElementById('notification');
      const currentLang = document.getElementById('language').value;
      const message = translations[currentLang]['notification-success'];
      
      notification.textContent = message;
      notification.style.display = 'block';
      
      setTimeout(() => {
        notification.style.display = 'none';
      }, 3000);
    });

    // Run when DOM builds
    window.addEventListener('DOMContentLoaded', loadSettings);
  </script>

</body>
</html>
